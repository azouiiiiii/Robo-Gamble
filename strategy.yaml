# 德州扑克 AI 硬性决策约束

preflop:

  no_fold_on_check: true

  # 翻前底池为0时底池赔率失效(to_call/0=100%)，自动改用筹码占比
  equity_override:
    when_pot_zero: "stack_pct"  # stack_pct = to_call/(筹码+to_call)*100，能合理区分便宜/贵

  # 强牌：禁止弃牌
  hard_continue_rules:
    - min_score: 8
      max_equity: 100
      action: call_or_raise
      desc: "AA/KK/QQ/AKs，几乎永不弃牌"

    - min_score: 6
      max_equity: 45
      action: call_or_raise
      desc: "中对子、AJ+/KQ，赔率合理必须继续"

    - min_score: 4
      max_equity: 25
      action: call
      desc: "小对子/投机牌，便宜入池"

    - min_score: 2
      max_equity: 5
      action: call
      desc: "带高张或同花的极边缘牌，成本极低必须看翻牌"

  # 新增：避免过度弃牌
  playable_hand_overrides:

    suited_ace:
      enabled: true
      min_rank: 2
      action_if_reasonable_price: call_or_raise
      max_equity: 35

    suited_broadway:
      enabled: true
      action_if_reasonable_price: call_or_raise
      max_equity: 35

    suited_connector:
      enabled: true
      min_gap: 0
      max_gap: 1
      action_if_reasonable_price: call
      max_equity: 25

    offsuit_broadway:
      enabled: true
      examples:
        - ATo
        - KQo
        - QJo
      action_if_reasonable_price: call
      max_equity: 28

  uncertainty_policy:
    prefer_call_over_fold_when_playable: true
    do_not_require_dominating_equity_preflop: true
    avoid_overfolding: true


postflop:

  draw_by_equity:
    min_outs: 4
    turn_multiplier: 4
    river_multiplier: 2

  made_hand_protect:
    min_made: "一对"
    vs_check: "check"

  semi_bluff:
    min_outs: 8
    allow_raise: true

  # ── 牌面纹理描述模板 ──
  board_labels:
    paired: "公牌有对子({rank})，须警惕三条/葫芦"
    monotone: "{count}张{suit}同花，同花威胁活跃"
    connected: "顺子听面活跃，连接度高"
    dry: "牌面很干，成牌价值可靠"
    default: "普通牌面"

  # ── 手牌描述模板 (纯事实填空，不做强弱判断) ──
  hand_labels:
    straight_flush: "同花顺"
    quads: "四条{rank}"
    boat: "{trips}葫芦(比你大的葫芦还有{better}种)"
    flush: "{high}同花(比你大的同花有{better}种)"
    nut_flush: "坚果同花(最大)"
    straight: "{top}顺(比你大的顺子还有{better}种)"
    trips: "三条{rank}(比你大的三条还有{better}种)"
    two_pair: "{top}{bottom}两对(比你大的两对还有{better}种)"
    overpair: "超对{rank}(所有公牌都比{rank}小)"
    top_pair: "顶对{rank}, 踢脚{kicker}(对子是公牌中最大的)"
    middle_pair: "中对{rank}(公牌有{better}张牌比{rank}大)"
    bottom_pair: "底对{rank}(公牌有{better}张牌比{rank}大)"
    high_card_a: "A高, 无对无听牌"
    high_card_k: "K高"
    combo_draw: "花顺双抽({outs}outs)"
    nut_fd: "坚果同花听牌({outs}outs)"
    fd_overs: "同花听牌+高张({outs}outs)"
    fd: "同花听牌({outs}outs)"
    oesd_overs: "两头顺听牌+高张({outs}outs)"
    oesd: "两头顺听牌({outs}outs)"
    gutshot: "卡顺听牌({outs}outs)"
    air: "空气牌(无对无听牌)"

general:

  raise:
    pot_fraction_min: 0.5
    pot_fraction_max: 1.2
