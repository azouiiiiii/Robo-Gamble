# 德州扑克 AI 硬性决策约束

preflop:

  no_fold_on_check: true

  # 强牌：禁止弃牌
  hard_continue_rules:
    - min_score: 8
      max_equity: 100
      action: call_or_raise
      desc: "AA/KK/QQ/AKs，几乎永不弃牌"

    - min_score: 6
      max_equity: 45
      action: call_or_raise
      desc: "中对子、AJ+/KQ，赔率合理必须继续"

    - min_score: 4
      max_equity: 25
      action: call
      desc: "小对子/投机牌，便宜入池"

  # 新增：避免过度弃牌
  playable_hand_overrides:

    suited_ace:
      enabled: true
      min_rank: 2
      action_if_reasonable_price: call_or_raise
      max_equity: 35

    suited_broadway:
      enabled: true
      action_if_reasonable_price: call_or_raise
      max_equity: 35

    suited_connector:
      enabled: true
      min_gap: 0
      max_gap: 1
      action_if_reasonable_price: call
      max_equity: 25

    offsuit_broadway:
      enabled: true
      examples:
        - ATo
        - KQo
        - QJo
      action_if_reasonable_price: call
      max_equity: 28

  uncertainty_policy:
    prefer_call_over_fold_when_playable: true
    do_not_require_dominating_equity_preflop: true
    avoid_overfolding: true


postflop:

  draw_by_equity:
    min_outs: 4
    turn_multiplier: 4
    river_multiplier: 2

  made_hand_protect:
    min_made: "一对"
    vs_check: "check"

  semi_bluff:
    min_outs: 8
    allow_raise: true

general:

  raise:
    pot_fraction_min: 0.5
    pot_fraction_max: 1.2
